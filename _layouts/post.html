---
layout: default
---

<article>
  <header class="mb-4">
    <h1>{{ page.title }}</h1>
    <p class="text-muted small">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%d %B %Y" }}
      </time>
      {% if page.tags.size > 0 %}
        &nbsp;·&nbsp;
        {% for tag in page.tags %}
          <span class="badge bg-secondary">{{ tag }}</span>
        {% endfor %}
      {% endif %}
    </p>
    <hr>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="mt-5">
    <a href="{{ '/' | relative_url }}" class="btn btn-outline-secondary btn-sm">← All posts</a>
  </footer>
</article>
