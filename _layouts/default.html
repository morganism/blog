<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{{ '/' | relative_url }}">Posts</a></li>
        <li class="nav-item"><a class="nav-link" href="https://github.com/morganism">GitHub</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5">
  {{ content }}
</main>

<footer class="border-top mt-5 py-4 text-muted small">
  <div class="container">
    &copy; {{ 'now' | date: "%Y" }} {{ site.author.name }} &middot;
    Built with Jekyll &middot;
    <a href="https://github.com/{{ site.author.github }}/blog" class="text-muted">Source</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ '/assets/js/app.js' | relative_url }}"></script>
</body>
</html>
